<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro - SGHSS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/financeiroHome.css">
</head>

<body>
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h1 class="mb-1">Financeiro</h1>
                <p class="text-muted mb-0">SGHSS - acompanhamento de receitas, despesas e pagamentos</p>
            </div>

            <a class="btn btn-outline-light" href="/pages/home.html">
                Voltar
            </a>
        </div>

        <div id="mensagemFinanceiro" class="mb-3"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card resumo-card">
                    <div class="card-body">
                        <p class="resumo-label mb-1">Receitas</p>
                        <h3 class="resumo-valor text-success mb-0" id="totalReceitas">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card resumo-card">
                    <div class="card-body">
                        <p class="resumo-label mb-1">Despesas</p>
                        <h3 class="resumo-valor text-danger mb-0" id="totalDespesas">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card resumo-card">
                    <div class="card-body">
                        <p class="resumo-label mb-1">Saldo</p>
                        <h3 class="resumo-valor text-primary mb-0" id="saldoFinanceiro">R$ 0,00</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title mb-3">Novo Lancamento</h4>

                <form id="formLancamentoFinanceiro">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="tipoLancamento" class="form-label">Tipo</label>
                            <select id="tipoLancamento" class="form-select">
                                <option value="receita">Receita</option>
                                <option value="despesa">Despesa</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="dataLancamento" class="form-label">Data</label>
                            <input type="date" class="form-control" id="dataLancamento">
                        </div>

                        <div class="col-md-3">
                            <label for="valorLancamento" class="form-label">Valor</label>
                            <input type="number" class="form-control" id="valorLancamento" min="0" step="0.01"
                                placeholder="0,00">
                        </div>

                        <div class="col-md-3">
                            <label for="statusLancamento" class="form-label">Status</label>
                            <select id="statusLancamento" class="form-select">
                                <option value="pago">Pago</option>
                                <option value="pendente">Pendente</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="descricaoLancamento" class="form-label">Descricao</label>
                            <input type="text" class="form-control" id="descricaoLancamento"
                                placeholder="Ex: Consulta particular, material hospitalar">
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-success" id="btnAdicionarLancamento">
                                Adicionar Lancamento
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
                    <h4 class="card-title mb-0">Lancamentos</h4>

                    <select id="filtroFinanceiro" class="form-select filtro-financeiro">
                        <option value="todos">Todos</option>
                        <option value="receita">Receitas</option>
                        <option value="despesa">Despesas</option>
                        <option value="pendente">Pendentes</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descricao</th>
                                <th>Tipo</th>
                                <th>Status</th>
                                <th class="text-end">Valor</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaLancamentosFinanceiros"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/financeiroHome.js"></script>
</body>

</html>
