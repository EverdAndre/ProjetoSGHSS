<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagamento - SGHSS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/pagamentoHome.css">
</head>

<body>
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h1 class="mb-1">Pagamento</h1>
                <p class="text-muted mb-0">SGHSS - finalize o pagamento para concluir o agendamento</p>
            </div>

            <a class="btn btn-outline-light" href="/pages/agendarHome.html">
                Voltar
            </a>
        </div>

        <div id="mensagemPagamento" class="mb-3"></div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Resumo do Agendamento</h4>

                        <dl class="resumo-lista mb-0">
                            <dt>Especialidade</dt>
                            <dd id="resumoEspecialidade">-</dd>

                            <dt>Profissional</dt>
                            <dd id="resumoProfissional">-</dd>

                            <dt>Data e horario</dt>
                            <dd id="resumoDataHorario">-</dd>

                            <dt>Tipo</dt>
                            <dd id="resumoTipo">-</dd>

                            <dt>Valor</dt>
                            <dd class="valor-consulta" id="resumoValor">R$ 180,00</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Dados do Pagamento</h4>

                        <form id="formPagamento">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="formaPagamento" class="form-label">Forma de pagamento</label>
                                    <select id="formaPagamento" class="form-select">
                                        <option value="cartao">Cartao de credito</option>
                                        <option value="pix">PIX</option>
                                        <option value="boleto">Boleto</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="nomePagador" class="form-label">Nome do pagador</label>
                                    <input type="text" class="form-control" id="nomePagador"
                                        placeholder="Nome completo">
                                </div>

                                <div class="col-md-8 campo-cartao">
                                    <label for="numeroCartao" class="form-label">Numero do cartao</label>
                                    <input type="text" class="form-control" id="numeroCartao"
                                        placeholder="0000 0000 0000 0000" maxlength="19">
                                </div>

                                <div class="col-md-4 campo-cartao">
                                    <label for="validadeCartao" class="form-label">Validade</label>
                                    <input type="text" class="form-control" id="validadeCartao" placeholder="MM/AA"
                                        maxlength="5">
                                </div>

                                <div class="col-md-4 campo-cartao">
                                    <label for="cvvCartao" class="form-label">CVV</label>
                                    <input type="text" class="form-control" id="cvvCartao" placeholder="000"
                                        maxlength="4">
                                </div>

                                <div class="col-md-8">
                                    <label for="documentoPagador" class="form-label">CPF do pagador</label>
                                    <input type="text" class="form-control" id="documentoPagador"
                                        placeholder="000.000.000-00">
                                </div>

                                <div class="col-12 d-flex gap-2 flex-wrap">
                                    <button type="submit" class="btn btn-success" id="btnConfirmarPagamento">
                                        Pagar e Concluir Agenda
                                    </button>

                                    <a class="btn btn-secondary" href="/pages/agendarHome.html">
                                        Cancelar
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/pagamentoHome.js"></script>
</body>

</html>
