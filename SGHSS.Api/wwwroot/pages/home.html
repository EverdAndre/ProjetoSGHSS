<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - SGHSS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/HomeStyle.css">
</head>

<body>
    <!-- MODAL - Página em construção -->
<div class="modal fade" id="modalConstrucao" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <!-- Avisos -->
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Aviso</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <p id="textoModal" class="mb-0 fs-5"></p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    OK
                </button>
            </div>

        </div>
    </div>
</div>
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h1 class="mb-1">SGHSS - Home</h1>
                <p class="text-muted mb-0" id="boasVindas">Bem-vindo</p>
            </div>

            <button class="btn btn-outline-danger" id="btnLogout">
                Sair
            </button>
        </div>

        <div id="mensagem" class="mb-3"></div>

        <!-- ACESSO RÁPIDO -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title mb-3">Acesso Rápido</h4>

                <div class="row g-3">
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" id="btnAgendarConsulta">
                            Agendar Consulta
                        </button>
                    </div>

                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" id="btnConsultorioVirtual">
                            Consultório Virtual
                        </button>
                    </div>

                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" id="btnAgendaConsultas">
                            Agenda de Consultas
                        </button>
                    </div>

                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" id="btnFinanceiro">
                            Financeiro
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTEÚDO ATUAL -->
        <div class="accordion" id="accordionHome">

            <div class="accordion-item">
                <h2 class="accordion-header" id="headingBuscaGeral">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseBuscaGeral">
                        Busca Geral
                    </button>
                </h2>
                <div id="collapseBuscaGeral" class="accordion-collapse collapse show" data-bs-parent="#accordionHome">
                    <div class="accordion-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label for="filtroListagem" class="form-label">Filtro</label>
                                <select id="filtroListagem" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="pessoas">Pessoas</option>
                                    <option value="usuarios">Usuários</option>
                                    <option value="profissionais">Profissionais de Saúde</option>
                                    <option value="pacientes">Pacientes</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" id="btnListar">
                                    Listar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-item mt-3">
                <h2 class="accordion-header" id="headingCadastroPessoa">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseCadastroPessoa">
                        Cadastro de Pessoa
                    </button>
                </h2>
                <div id="collapseCadastroPessoa" class="accordion-collapse collapse" data-bs-parent="#accordionHome">
                    <div class="accordion-body">
                        <form id="formCadastroPessoa">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="cadNome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="cadNome" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="cadCpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="cadCpf" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="cadDataNascimento" class="form-label">Data de Nascimento</label>
                                    <input type="text" class="form-control" id="cadDataNascimento"
                                        placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" required>
                                </div>

                                <div class="col-md-8">
                                    <label for="cadEndereco" class="form-label">Endereço</label>
                                    <input type="text" class="form-control" id="cadEndereco">
                                </div>

                                <div class="col-md-6">
                                    <label for="cadTelefone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="cadTelefone">
                                </div>

                                <div class="col-md-6 d-flex align-items-end">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="cadAtivo" checked>
                                        <label class="form-check-label" for="cadAtivo">
                                            Ativo
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-success">
                                        Cadastrar Pessoa
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="accordion-item mt-3">
                <h2 class="accordion-header" id="headingAtualizacao">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseAtualizacao">
                        Atualização e Complementação de Cadastro
                    </button>
                </h2>
                <div id="collapseAtualizacao" class="accordion-collapse collapse" data-bs-parent="#accordionHome">
                    <div class="accordion-body">

                        <div class="row g-3 align-items-end mb-4">
                            <div class="col-md-6">
                                <label for="buscaNomeAtualizacao" class="form-label">Buscar Pessoa por Nome</label>
                                <input type="text" class="form-control" id="buscaNomeAtualizacao"
                                    placeholder="Digite o nome">
                            </div>

                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" id="btnBuscarPessoa">
                                    Buscar
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h5>Resultados da Busca</h5>
                            <div class="table-responsive">
                                <table class="table table-bordered table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Nome</th>
                                            <th>CPF</th>
                                            <th>Selecionar</th>
                                            <th>Excluir</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabelaBuscaPessoa">
                                        <tr>
                                            <td colspan="5" class="text-center text-muted">
                                                Nenhuma busca realizada.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="card mb-4 d-none" id="cardPessoaSelecionada">
                            <div class="card-body">
                                <h5 class="card-title">Pessoa Selecionada</h5>
                                <p class="mb-1"><strong>ID Pessoa:</strong> <span id="selIdPessoa"></span></p>
                                <p class="mb-1"><strong>Nome:</strong> <span id="selNomePessoa"></span></p>
                                <p class="mb-0"><strong>CPF:</strong> <span id="selCpfPessoa"></span></p>
                            </div>
                        </div>

                        <form id="formAtualizacao" class="d-none">
                            <input type="hidden" id="updIdPessoa">

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="updNome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="updNome" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="updCpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="updCpf" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="updDataNascimento" class="form-label">Data de Nascimento</label>
                                    <input type="text" class="form-control" id="updDataNascimento"
                                        placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" required>
                                </div>

                                <div class="col-md-8">
                                    <label for="updEndereco" class="form-label">Endereço</label>
                                    <input type="text" class="form-control" id="updEndereco">
                                </div>

                                <div class="col-md-6">
                                    <label for="updTelefone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="updTelefone">
                                </div>

                                <div class="col-md-6 d-flex align-items-end">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="updAtivo">
                                        <label class="form-check-label" for="updAtivo">
                                            Ativo
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <hr>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="perfilComplementar" class="form-label">Perfil da Pessoa</label>
                                    <select id="perfilComplementar" class="form-select">
                                        <option value="">Selecione</option>
                                        <option value="admin">Administrador</option>
                                        <option value="profissional">Profissional de Saúde</option>
                                        <option value="paciente">Paciente</option>
                                    </select>
                                </div>
                            </div>

                            <div id="blocoUsuario" class="border rounded p-3 mb-3 d-none">
                                <h6>Dados de Usuário</h6>
                                <div class="row g-3">
                                    <input type="hidden" id="updIdUsuario">
                                    <input type="hidden" id="updPerfilUsuario">
                                    <div class="col-md-6">
                                        <label for="updEmailUsuario" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="updEmailUsuario" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="updSenhaUsuario" class="form-label">Senha</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control" id="updSenhaUsuario">
                                            <button class="btn btn-outline-secondary btn-toggle-senha" type="button"
                                                data-target="updSenhaUsuario">
                                                Mostrar
                                            </button>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="updConfirmarSenhaUsuario" class="form-label">Confirmar Senha</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control" id="updConfirmarSenhaUsuario">
                                            <button class="btn btn-outline-secondary btn-toggle-senha" type="button"
                                                data-target="updConfirmarSenhaUsuario">
                                                Mostrar
                                            </button>
                                        </div>
                                    </div>
                                    <div class="col-md-6 d-flex align-items-end">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="updUsuarioAtivo"
                                                checked>
                                            <label class="form-check-label" for="updUsuarioAtivo">
                                                Usuário Ativo
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div id="blocoProfissional" class="border rounded p-3 mb-3 d-none">
                                <h6>Dados de Profissional de Saúde</h6>
                                <div class="row g-3">
                                    <input type="hidden" id="updIdProfissionalSaude">

                                    <div class="col-md-6">
                                        <label for="updCodRegProf" class="form-label">Registro Profissional</label>
                                        <input type="text" class="form-control" id="updCodRegProf">
                                    </div>

                                    <div class="col-md-6">
                                        <label for="updEspecialidade" class="form-label">Especialidade</label>
                                        <input type="text" class="form-control" id="updEspecialidade">
                                    </div>

                                    <div class="col-md-6 d-flex align-items-end">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="updProfissionalAtivo"
                                                checked>
                                            <label class="form-check-label" for="updProfissionalAtivo">
                                                Profissional Ativo
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div id="blocoPaciente" class="border rounded p-3 mb-3 d-none">
                                <h6>Dados de Paciente</h6>
                                <div class="row g-3">
                                    <input type="hidden" id="updIdPaciente">

                                    <div class="col-md-6">
                                        <label for="updNumeroCartaoSUS" class="form-label">Número Cartão SUS</label>
                                        <input type="text" class="form-control" id="updNumeroCartaoSUS">
                                    </div>

                                    <div class="col-md-6">
                                        <label for="updTipoSanguineo" class="form-label">Tipo Sanguíneo</label>
                                        <input type="text" class="form-control" id="updTipoSanguineo">
                                    </div>

                                    <div class="col-md-12">
                                        <label for="updAlergias" class="form-label">Alergias</label>
                                        <input type="text" class="form-control" id="updAlergias">
                                    </div>

                                    <div class="col-md-6 d-flex align-items-end">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="updPacienteAtivo"
                                                checked>
                                            <label class="form-check-label" for="updPacienteAtivo">
                                                Paciente Ativo
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning">
                                    Salvar Atualização
                                </button>

                                <button type="button" class="btn btn-secondary" id="btnLimparAtualizacao">
                                    Voltar
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Resultado</h5>
                <pre id="resultado" class="bg-light p-3 rounded border"
                    style="min-height: 260px; white-space: pre-wrap;"></pre>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="../js/home.js"></script>
</body>

</html>
